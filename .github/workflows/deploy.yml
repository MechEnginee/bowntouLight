name: Deploy to GitHub Pages

on:
  # main 브랜치에 푸시될 때 자동 배포
  push:
    branches: [main]
  # Actions 탭에서 수동 실행도 가능
  workflow_dispatch:

# GITHUB_TOKEN이 Pages에 배포할 수 있도록 권한 부여
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나의 배포만 진행 (진행 중인 런은 취소하지 않고 큐잉)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        # 실제 프로젝트는 이 하위 폴더에 있다
        working-directory: worship-lighting-sim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: worship-lighting-sim/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: worship-lighting-sim/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
